<!DOCTYPE html>
<html lang="en" class="fixed inset-0 overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DroidCam — Camera</title>
    <meta name="description" content="DroidCam mobile camera controller — stream your phone camera to PC">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090a0f',
                        darkCard: '#131520',
                        brandPurple: '#6366f1',
                        brandTeal: '#14b8a6',
                    },
                    fontFamily: {
                        sans: ['"Outfit"', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <!-- App CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-dot {
            animation: pulse-dot 1.2s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.2s linear infinite;
        }

        /* Custom range slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 9999px;
            background: #1e2030;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: 2px solid #090a0f;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            border: 2px solid #090a0f;
        }
    </style>
</head>
<body class="fixed inset-0 overflow-hidden bg-darkBg text-gray-200 antialiased selection:bg-brandPurple/30">

    <!-- ===== Auth Overlay ===== -->
    <div id="pin-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-darkBg/95 z-50">
        <div class="w-full max-w-xs px-6 py-8 bg-darkCard border border-white/10 rounded-2xl text-center space-y-6 shadow-2xl">
            <div class="flex justify-center">
                <div class="w-12 h-12 rounded-full bg-brandPurple/20 flex items-center justify-center text-brandPurple">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
            </div>
            <div class="space-y-1">
                <h3 class="text-lg font-semibold text-white">Pairing PIN Required</h3>
                <p class="text-xs text-gray-400">Enter the 6-digit PIN shown on the PC dashboard to begin</p>
            </div>
            <div class="flex justify-center gap-2">
                <input type="text" maxlength="6" pattern="\d{6}" inputmode="numeric" id="pin-input" class="w-48 tracking-[0.5em] text-center text-xl font-bold bg-darkBg border border-white/10 rounded-xl py-3 focus:outline-none focus:border-brandPurple focus:ring-1 focus:ring-brandPurple" placeholder="••••••">
            </div>
            <button id="btn-auth-pin" class="w-full h-11 bg-brandPurple hover:bg-brandPurple/90 text-white font-semibold rounded-xl active:scale-95 transition-all hover-lift">
                Connect Camera
            </button>
            <p id="pin-error" class="text-xs text-red-400 hidden">Incorrect PIN. Please try again.</p>
        </div>
    </div>

    <!-- ===== ROOT LAYOUT — full-screen flex column ===== -->
    <div id="app-root" class="absolute inset-0 flex flex-col w-full h-full overflow-hidden bg-darkBg">

        <!-- ===== HEADER BAR ===== -->
        <header id="header-bar" class="flex flex-wrap items-center justify-between px-3 py-2 bg-darkCard/80 backdrop-blur-md border-b border-white/5 z-30 shrink-0 gap-2">
            <!-- Left: Socket Status -->
            <div id="socket-status" class="flex items-center gap-1.5 shrink-0">
                <span id="socket-dot" class="w-2 h-2 rounded-full bg-red-500 animate-pulse-dot shrink-0"></span>
                <span id="socket-label" class="text-xs font-medium text-gray-400 truncate">Connecting...</span>
            </div>

            <!-- Right: Badges -->
            <div class="flex flex-wrap items-center justify-end gap-1.5 flex-1 min-w-0">
                <!-- Stream Indicator -->
                <span id="stream-badge" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wider bg-gray-700/60 text-gray-400 shrink-0">
                    <span id="stream-dot" class="w-1.5 h-1.5 rounded-full bg-gray-500 shrink-0"></span>
                    <span id="stream-label" class="whitespace-nowrap">Standby</span>
                </span>
                <!-- Quality Badge -->
                <span id="quality-badge" class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-brandPurple/20 text-brandPurple shrink-0 whitespace-nowrap">720p</span>
                <!-- FPS Badge -->
                <span id="fps-badge" class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-brandTeal/20 text-brandTeal shrink-0 whitespace-nowrap">15 FPS</span>
            </div>
        </header>

        <!-- ===== CONTROL PANEL — Settings & Actions ===== -->
        <div id="control-panel" class="bg-[#1a1c29] border-b border-white/10 z-30 shrink-0 flex flex-col">
            <!-- Settings Panel -->
            <div id="settings-panel" class="px-4 sm:px-6 pt-3 pb-2 space-y-3 max-h-[35vh] overflow-y-auto">
                <!-- Camera selector -->
                <div class="flex items-center gap-3">
                    <label for="camera-select" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Camera</label>
                    <select id="camera-select" class="flex-1 min-w-0 w-full bg-darkBg border border-white/10 rounded-xl px-3 py-2 text-xs sm:text-sm text-gray-200 focus:outline-none focus:border-brandPurple/50 appearance-none truncate">
                        <option value="">Detecting cameras…</option>
                    </select>
                </div>

                <!-- JPEG Quality slider -->
                <div class="flex items-center gap-3">
                    <label for="quality-slider" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Quality</label>
                    <input id="quality-slider" type="range" min="40" max="95" value="82" class="flex-1 min-w-0 w-full accent-brandPurple">
                    <span id="quality-slider-value" class="text-xs sm:text-sm text-gray-400 font-mono w-10 text-right shrink-0">82%</span>
                </div>

                <!-- FPS display (read-only) -->
                <div class="flex items-center gap-3">
                    <span class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">FPS</span>
                    <span id="fps-display" class="text-xs sm:text-sm text-gray-300 font-mono shrink-0">15</span>
                    <span class="text-[9px] sm:text-[10px] text-gray-500 truncate">(controlled remotely)</span>
                </div>

                <!-- Zoom slider (dynamic) -->
                <div id="zoom-container" class="hidden items-center gap-3">
                    <label for="zoom-slider" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Zoom</label>
                    <input id="zoom-slider" type="range" class="flex-1 min-w-0 w-full accent-brandPurple">
                    <span id="zoom-value" class="text-xs sm:text-sm text-gray-400 font-mono w-10 text-right shrink-0">1.0x</span>
                </div>

                <!-- Lens mode selector -->
                <div class="flex items-center gap-3">
                    <label for="lens-mode-select" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Lens</label>
                    <select id="lens-mode-select" class="flex-1 min-w-0 w-full bg-darkBg border border-white/10 rounded-xl px-3 py-2 text-xs sm:text-sm text-gray-200 focus:outline-none focus:border-brandPurple/50 appearance-none truncate">
                        <option value="auto">Auto best</option>
                        <option value="standard">Standard</option>
                        <option value="macro">Macro zoom</option>
                    </select>
                </div>

                <!-- Focus Mode (dynamic) -->
                <div id="focus-container" class="hidden items-center gap-3">
                    <label for="focus-select" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Focus</label>
                    <select id="focus-select" class="flex-1 min-w-0 w-full bg-darkBg border border-white/10 rounded-xl px-3 py-2 text-xs sm:text-sm text-gray-200 focus:outline-none focus:border-brandPurple/50 appearance-none truncate">
                    </select>
                </div>

                <!-- Exposure Compensation (dynamic) -->
                <div id="exposure-container" class="hidden items-center gap-3 shrink-0">
                    <label for="exposure-slider" class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 font-bold shrink-0 w-16">Exposure</label>
                    <input id="exposure-slider" type="range" class="flex-1 min-w-0 w-full accent-brandPurple">
                    <span id="exposure-value" class="text-xs sm:text-sm text-gray-400 font-mono w-10 text-right shrink-0">0</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="action-buttons" class="flex flex-wrap items-center justify-between gap-2 px-4 sm:px-6 pb-3 pt-1">
                <div class="flex items-center gap-2 shrink-0">
                    <!-- Refresh Devices -->
                    <button id="btn-refresh" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-darkBg border border-white/10 text-gray-400 active:scale-95 transition-transform hover:text-white" title="Refresh devices">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
                            <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
                        </svg>
                    </button>

                    <!-- Flip Camera -->
                    <button id="btn-flip" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-darkBg border border-white/10 text-gray-400 active:scale-95 transition-transform hover:text-white" title="Flip camera">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 3h5v5"/>
                            <path d="M8 21H3v-5"/>
                            <path d="M21 3l-7 7"/>
                            <path d="M3 21l7-7"/>
                        </svg>
                    </button>

                    <!-- Toggle Flash -->
                    <button id="btn-flash" class="shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-darkBg border border-white/10 text-gray-400 active:scale-95 transition-colors hidden" title="Toggle Flash">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                    </button>
                </div>

                <!-- Stream Toggle -->
                <button id="btn-stream" class="flex-1 min-w-[120px] h-10 flex items-center justify-center gap-2 rounded-xl bg-brandPurple text-white font-semibold text-sm active:scale-95 transition-all shadow-sm">
                    <svg id="icon-play" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="icon-stop" class="w-4 h-4 hidden shrink-0" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h12v12H6z"/>
                    </svg>
                    <span id="btn-stream-label" class="truncate">Start Stream</span>
                </button>
            </div>
        </div>

        <!-- ===== MAIN AREA — Camera Preview ===== -->
        <main id="camera-area" class="relative flex-1 min-h-0 bg-black overflow-hidden w-full rounded-t-3xl sm:rounded-t-[2.5rem]">
            <!-- Video Preview -->
            <video id="camera-preview" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>

            <!-- Loading Spinner Overlay -->
            <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-darkBg/80 z-10">
                <svg class="w-10 h-10 text-brandPurple animate-spin-slow" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="50 20" />
                </svg>
                <span class="mt-3 text-xs text-gray-400 font-medium">Initializing camera…</span>
            </div>

            <!-- Error Overlay -->
            <div id="error-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-darkBg/90 z-10 hidden">
                <svg class="w-12 h-12 text-red-400 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="error-title" class="text-sm font-semibold text-red-300 mb-1">Camera Error</span>
                <span id="error-message" class="text-xs text-gray-400 text-center px-8 leading-relaxed">Unable to access camera. Please grant camera permissions and reload.</span>
            </div>

            <!-- Stats Overlay (bottom-left) -->
            <div id="stats-overlay" class="absolute bottom-3 left-3 flex flex-col gap-0.5 bg-black/60 backdrop-blur-sm rounded-lg px-2.5 py-1.5 z-10 hidden">
                <span id="stats-resolution" class="text-[10px] font-mono text-gray-300">—</span>
                <span id="stats-frame-size" class="text-[10px] font-mono text-gray-400">—</span>
            </div>
        </main>
    </div>

    <!-- ===== SocketIO ===== -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
    (function () {
        'use strict';

        // ——————————————————————————————————
        // Quality presets
        // ——————————————————————————————————
        const QUALITY_PRESETS = {
            '360p':  { width: 480,  height: 360,  jpegQuality: 58 },
            '480p':  { width: 640,  height: 480,  jpegQuality: 68 },
            '720p':  { width: 1280, height: 720,  jpegQuality: 82 },
            '1080p': { width: 1920, height: 1080, jpegQuality: 90 },
        };

        // ——————————————————————————————————
        // State
        // ——————————————————————————————————
        let localStream = null;
        let isStreaming = false;
        let frameTimeout = null;
        let selectedDeviceId = '';
        let nextFrameId = 0;
        let pendingFrames = new Map();
        let imageCapture = null;
        let knownCameras = [];
        let currentQuality = '720p';
        let currentMaxWidth = 1280;
        let currentMaxHeight = 720;
        let currentFps = 15;
        let currentJpegQuality = 82;
        let currentLensMode = 'auto';
        let isFlashOn = false;

        const encodeFormat = 'image/jpeg';

        // Hidden canvas for frame capture
        const captureCanvas = document.createElement('canvas');
        const captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });

        // ——————————————————————————————————
        // DOM References
        // ——————————————————————————————————
        const video              = document.getElementById('camera-preview');
        const loadingOverlay     = document.getElementById('loading-overlay');
        const errorOverlay       = document.getElementById('error-overlay');
        const errorTitle         = document.getElementById('error-title');
        const errorMessage       = document.getElementById('error-message');
        const statsOverlay       = document.getElementById('stats-overlay');
        const statsResolution    = document.getElementById('stats-resolution');
        const statsFrameSize     = document.getElementById('stats-frame-size');

        const socketDot          = document.getElementById('socket-dot');
        const socketLabel        = document.getElementById('socket-label');
        const streamBadge        = document.getElementById('stream-badge');
        const streamDot          = document.getElementById('stream-dot');
        const streamLabel        = document.getElementById('stream-label');
        const qualityBadge       = document.getElementById('quality-badge');
        const fpsBadge           = document.getElementById('fps-badge');

        const cameraSelect       = document.getElementById('camera-select');
        const lensModeSelect     = document.getElementById('lens-mode-select');
        const qualitySlider      = document.getElementById('quality-slider');
        const qualitySliderValue = document.getElementById('quality-slider-value');
        const fpsDisplay         = document.getElementById('fps-display');

        const btnRefresh         = document.getElementById('btn-refresh');
        const btnFlip            = document.getElementById('btn-flip');
        const btnStream          = document.getElementById('btn-stream');
        const btnStreamLabel     = document.getElementById('btn-stream-label');
        const iconPlay           = document.getElementById('icon-play');
        const iconStop           = document.getElementById('icon-stop');

        // ——————————————————————————————————
        // Socket
        // ——————————————————————————————————
        const isSecure = window.location.protocol === 'https:';
        const socket = io({ secure: isSecure, rejectUnauthorized: false });

        socket.on('require_pin', () => {
            document.getElementById('pin-overlay').classList.remove('hidden');
            document.getElementById('pin-input').value = '';
            document.getElementById('pin-error').classList.add('hidden');
        });

        socket.on('pin_auth_status', (res) => {
            if (res.success) {
                document.getElementById('pin-overlay').classList.add('hidden');
                initCamera();
            } else {
                const errEl = document.getElementById('pin-error');
                errEl.textContent = res.message || 'Incorrect PIN. Please try again.';
                errEl.classList.remove('hidden');
            }
        });

        const pinInput = document.getElementById('pin-input');
        const btnAuthPin = document.getElementById('btn-auth-pin');
        btnAuthPin.addEventListener('click', () => {
            const pin = pinInput.value.trim();
            if (pin.length === 6 && /^\d+$/.test(pin)) {
                document.getElementById('pin-error').classList.add('hidden');
                socket.emit('pin_auth', { pin: pin });
            } else {
                const errEl = document.getElementById('pin-error');
                errEl.textContent = 'Please enter a 6-digit number.';
                errEl.classList.remove('hidden');
            }
        });
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnAuthPin.click();
        });

        socket.on('connect', () => {
            socket.emit('join', { client_type: 'mobile' });
            socketDot.classList.remove('bg-red-500', 'animate-pulse-dot');
            socketDot.classList.add('bg-green-500');
            socketLabel.textContent = 'Connected';
            socketLabel.classList.remove('text-gray-400');
            socketLabel.classList.add('text-green-400');
        });

        socket.on('disconnect', () => {
            socketDot.classList.remove('bg-green-500');
            socketDot.classList.add('bg-red-500', 'animate-pulse-dot');
            socketLabel.textContent = 'Connecting...';
            socketLabel.classList.remove('text-green-400');
            socketLabel.classList.add('text-gray-400');
        });

        document.getElementById('btn-flash').addEventListener('click', async () => {
            if (!localStream) return;
            const track = localStream.getVideoTracks()[0];
            try {
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                updateFlashUI();
                socket.emit('hardware_control', { type: 'torch', value: isFlashOn });
            } catch (err) {
                console.error('Failed to toggle flash', err);
            }
        });

        function updateFlashUI() {
            const btn = document.getElementById('btn-flash');
            if (isFlashOn) {
                btn.classList.add('text-brandPurple', 'bg-brandPurple/10', 'border-brandPurple/30');
                btn.classList.remove('text-gray-400', 'bg-darkBg', 'border-white/10');
            } else {
                btn.classList.remove('text-brandPurple', 'bg-brandPurple/10', 'border-brandPurple/30');
                btn.classList.add('text-gray-400', 'bg-darkBg', 'border-white/10');
            }
        }

        // ——————————————————————————————————
        // Remote Control Handlers
        // ——————————————————————————————————

        socket.on('toggle_stream', (data) => {
            if (data.start && !isStreaming) {
                startStreaming();
            } else if (!data.start && isStreaming) {
                stopStreaming();
            }
        });

        socket.on('switch_camera', () => {
            flipCamera();
        });

        socket.on('select_camera', (data) => {
            if (!data || !data.device_id) return;
            selectedDeviceId = data.device_id;
            cameraSelect.value = selectedDeviceId;
            currentLensMode = 'auto';
            lensModeSelect.value = currentLensMode;

            const wasStreaming = isStreaming;
            if (isStreaming) stopStreaming();

            initCamera().then(() => {
                if (wasStreaming) startStreaming();
            });
        });

        socket.on('set_quality', (data) => {
            if (!data) return;
            currentQuality = data.quality || currentQuality;
            currentMaxWidth = data.width || currentMaxWidth;
            currentMaxHeight = data.height || currentMaxHeight;
            currentJpegQuality = data.jpeg_quality || QUALITY_PRESETS[currentQuality]?.jpegQuality || currentJpegQuality;

            qualityBadge.textContent = currentQuality;
            qualitySlider.value = currentJpegQuality;
            qualitySliderValue.textContent = currentJpegQuality + '%';

            if (localStream) {
                const wasStreaming = isStreaming;
                if (isStreaming) stopStreaming();

                initCamera().then(() => {
                    if (wasStreaming) startStreaming();
                });
            }
        });

        socket.on('set_lens_mode', (data) => {
            if (!data || !data.lens_mode) return;
            switchLensMode(data.lens_mode);
        });

        socket.on('set_fps', (data) => {
            if (!data || !data.fps) return;
            currentFps = data.fps;
            fpsBadge.textContent = currentFps + ' FPS';
            fpsDisplay.textContent = currentFps;

            if (isStreaming) {
                restartSendingLoop();
            }
        });

        socket.on('frame_ack', (data) => {
            const frameId = data && data.frame_id;
            if (!frameId || !pendingFrames.has(frameId)) return;
            clearTimeout(pendingFrames.get(frameId));
            pendingFrames.delete(frameId);
        });

        socket.on('take_highres_snapshot', async () => {
            if (imageCapture) {
                try {
                    const photoBlob = await imageCapture.takePhoto();
                    socket.emit('save_snapshot', {
                        image: photoBlob,
                        mime_type: photoBlob.type || 'image/jpeg',
                        timestamp: Date.now()
                    });
                } catch (err) {
                    console.error('High-res snapshot failed, falling back to canvas:', err);
                    captureCanvas.toBlob((blob) => {
                        socket.emit('save_snapshot', { image: blob, mime_type: 'image/jpeg', timestamp: Date.now() });
                    }, 'image/jpeg', 0.95);
                }
            } else {
                captureCanvas.toBlob((blob) => {
                    socket.emit('save_snapshot', { image: blob, mime_type: 'image/jpeg', timestamp: Date.now() });
                }, 'image/jpeg', 0.95);
            }
        });

        socket.on('hardware_control', async (data) => {
            if (!localStream) return;
            const track = localStream.getVideoTracks()[0];
            try {
                const constraint = {};
                constraint[data.type] = data.value;
                await track.applyConstraints({ advanced: [constraint] });
                
                // Update local UI
                if (data.type === 'zoom') {
                    const zoomSlider = document.getElementById('zoom-slider');
                    const zoomValue = document.getElementById('zoom-value');
                    if (zoomSlider) { zoomSlider.value = data.value; zoomValue.textContent = Number(data.value).toFixed(1) + 'x'; }
                } else if (data.type === 'focusMode') {
                    const focusSelect = document.getElementById('focus-select');
                    if (focusSelect) focusSelect.value = data.value;
                } else if (data.type === 'exposureCompensation') {
                    const expSlider = document.getElementById('exposure-slider');
                    const expValue = document.getElementById('exposure-value');
                    if (expSlider) { expSlider.value = data.value; expValue.textContent = Number(data.value).toFixed(1); }
                } else if (data.type === 'torch') {
                    isFlashOn = data.value;
                    updateFlashUI();
                }
            } catch (err) {
                console.error('Hardware control failed:', err);
            }
        });

        function isMacroCamera(camera) {
            return /macro|microscope|close[\s-]?up|near/i.test(camera.label || '');
        }

        function isRearCamera(camera) {
            return /back|rear|environment|world/i.test(camera.label || '');
        }

        function cameraDisplayLabel(camera, index) {
            const baseLabel = camera.label || ('Camera ' + (index + 1));
            if (isMacroCamera(camera)) return baseLabel + ' (Macro)';
            if (isRearCamera(camera)) return baseLabel + ' (Rear)';
            return baseLabel;
        }

        function chooseCameraForLens(lensMode, cameras) {
            if (!cameras || cameras.length === 0) return null;

            const macroCamera = cameras.find(isMacroCamera);
            const rearCamera = cameras.find((camera) => isRearCamera(camera) && !isMacroCamera(camera));

            if (lensMode === 'macro') {
                return macroCamera || rearCamera || cameras[0];
            }
            if (lensMode === 'standard') {
                return rearCamera || cameras.find((camera) => !isMacroCamera(camera)) || cameras[0];
            }
            return rearCamera || macroCamera || cameras[0];
        }

        async function switchLensMode(lensMode) {
            currentLensMode = lensMode;
            lensModeSelect.value = currentLensMode;

            if (knownCameras.length === 0) {
                await loadCameraDevices();
            }

            const selectedCamera = chooseCameraForLens(currentLensMode, knownCameras);
            if (!selectedCamera) return;

            selectedDeviceId = selectedCamera.deviceId;
            cameraSelect.value = selectedDeviceId;

            const wasStreaming = isStreaming;
            if (isStreaming) stopStreaming();

            await initCamera();

            if (wasStreaming) startStreaming();
        }

        async function applyBestEffortCameraDefaults(track) {
            if (!track || !track.getCapabilities) return;

            const caps = track.getCapabilities();
            const advanced = [];

            if (caps.focusMode && caps.focusMode.includes('continuous')) {
                advanced.push({ focusMode: 'continuous' });
            }
            if (caps.exposureMode && caps.exposureMode.includes('continuous')) {
                advanced.push({ exposureMode: 'continuous' });
            }
            if (caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')) {
                advanced.push({ whiteBalanceMode: 'continuous' });
            }

            if (advanced.length === 0) return;

            try {
                await track.applyConstraints({ advanced });
            } catch (err) {
                console.warn('Best-effort camera defaults were not accepted', err);
            }
        }

        // ——————————————————————————————————
        // Camera Initialization
        // ——————————————————————————————————

        async function initCamera() {
            loadingOverlay.classList.remove('hidden');
            errorOverlay.classList.add('hidden');
            statsOverlay.classList.add('hidden');

            // Stop existing tracks
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }

            const constraints = {
                video: {
                    width:  { ideal: currentMaxWidth },
                    height: { ideal: currentMaxHeight },
                    frameRate: { ideal: currentFps },
                    facingMode: { ideal: 'environment' },
                },
                audio: false,
            };

            if (selectedDeviceId) {
                constraints.video.deviceId = { exact: selectedDeviceId };
                delete constraints.video.facingMode;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = localStream;

                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        const vw = video.videoWidth;
                        const vh = video.videoHeight;
                        statsResolution.textContent = vw + ' × ' + vh;
                        statsOverlay.classList.remove('hidden');
                        loadingOverlay.classList.add('hidden');
                        resolve();
                    };
                });

                await loadCameraDevices();

                // Check for Advanced Capabilities (Zoom, Macro, Exposure)
                const track = localStream.getVideoTracks()[0];
                await applyBestEffortCameraDefaults(track);
                
                if (window.ImageCapture) {
                    imageCapture = new ImageCapture(track);
                } else {
                    imageCapture = null;
                }

                if (track && track.getCapabilities) {
                    const caps = track.getCapabilities();
                    const settings = track.getSettings();
                    
                    const zoomContainer = document.getElementById('zoom-container');
                    const zoomSlider = document.getElementById('zoom-slider');
                    const zoomValue = document.getElementById('zoom-value');
                    if (caps.zoom) {
                        zoomSlider.min = caps.zoom.min;
                        zoomSlider.max = caps.zoom.max;
                        zoomSlider.step = caps.zoom.step || 0.1;
                        zoomSlider.value = settings.zoom || 1.0;
                        zoomValue.textContent = Number(zoomSlider.value).toFixed(1) + 'x';
                        zoomContainer.classList.remove('hidden');
                        zoomContainer.classList.add('flex');
                    } else {
                        zoomContainer.classList.add('hidden');
                        zoomContainer.classList.remove('flex');
                    }
                    
                    const focusContainer = document.getElementById('focus-container');
                    const focusSelect = document.getElementById('focus-select');
                    if (caps.focusMode) {
                        focusSelect.innerHTML = '';
                        caps.focusMode.forEach(mode => {
                            const opt = document.createElement('option');
                            opt.value = mode;
                            opt.textContent = mode;
                            if (mode === settings.focusMode) opt.selected = true;
                            focusSelect.appendChild(opt);
                        });
                        focusContainer.classList.remove('hidden');
                        focusContainer.classList.add('flex');
                    } else {
                        focusContainer.classList.add('hidden');
                        focusContainer.classList.remove('flex');
                    }

                    const expContainer = document.getElementById('exposure-container');
                    const expSlider = document.getElementById('exposure-slider');
                    const expValue = document.getElementById('exposure-value');
                    if (caps.exposureCompensation) {
                        expSlider.min = caps.exposureCompensation.min;
                        expSlider.max = caps.exposureCompensation.max;
                        expSlider.step = caps.exposureCompensation.step || 0.1;
                        expSlider.value = settings.exposureCompensation || 0;
                        expValue.textContent = Number(expSlider.value).toFixed(1);
                        expContainer.classList.remove('hidden');
                        expContainer.classList.add('flex');
                    } else {
                        expContainer.classList.add('hidden');
                        expContainer.classList.remove('flex');
                    }

                    const btnFlash = document.getElementById('btn-flash');
                    // Force show flash button since some browsers hide the torch capability until requested
                    btnFlash.classList.remove('hidden');
                    isFlashOn = settings.torch || false;
                    updateFlashUI();

                    // Sync capabilities back to the PC dashboard
                    socket.emit('capabilities_update', {
                        zoom: caps.zoom ? { min: caps.zoom.min, max: caps.zoom.max, step: caps.zoom.step, current: settings.zoom } : null,
                        focusMode: caps.focusMode ? { options: caps.focusMode, current: settings.focusMode } : null,
                        exposureCompensation: caps.exposureCompensation ? { min: caps.exposureCompensation.min, max: caps.exposureCompensation.max, step: caps.exposureCompensation.step, current: settings.exposureCompensation } : null,
                        torch: { current: isFlashOn } // Force true and pass state
                    });
                } else {
                    // Send null capabilities if track capabilities are unavailable
                    socket.emit('capabilities_update', { zoom: null, focusMode: null, exposureCompensation: null, torch: null });
                }
            } catch (err) {
                console.error('Camera init error:', err);
                loadingOverlay.classList.add('hidden');
                showError('Camera Error', friendlyError(err));
            }
        }

        function friendlyError(err) {
            if (err.name === 'NotAllowedError') {
                return 'Camera permission denied. Please allow camera access in your browser settings and reload.';
            }
            if (err.name === 'NotFoundError') {
                return 'No camera found on this device.';
            }
            if (err.name === 'NotReadableError' || err.name === 'AbortError') {
                return 'Camera is in use by another application. Close other apps and try again.';
            }
            if (err.name === 'OverconstrainedError') {
                return 'Selected camera does not support the requested resolution. Try a different quality preset.';
            }
            return err.message || 'An unknown camera error occurred.';
        }

        function showError(title, message) {
            errorTitle.textContent = title;
            errorMessage.textContent = message;
            errorOverlay.classList.remove('hidden');
        }

        // ——————————————————————————————————
        // Camera Enumeration
        // ——————————————————————————————————

        async function loadCameraDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === 'videoinput');
                knownCameras = cameras;

                cameraSelect.innerHTML = '';

                cameras.forEach((cam, i) => {
                    const opt = document.createElement('option');
                    opt.value = cam.deviceId;
                    opt.textContent = cameraDisplayLabel(cam, i);
                    cameraSelect.appendChild(opt);
                });

                const lensChoice = currentLensMode !== 'auto'
                    ? chooseCameraForLens(currentLensMode, cameras)
                    : null;

                if (lensChoice) {
                    selectedDeviceId = lensChoice.deviceId;
                    cameraSelect.value = selectedDeviceId;
                } else if (selectedDeviceId && cameras.some(c => c.deviceId === selectedDeviceId)) {
                    cameraSelect.value = selectedDeviceId;
                } else {
                    // Default to back/environment camera if possible
                    const backCam = chooseCameraForLens('auto', cameras);
                    if (backCam) {
                        selectedDeviceId = backCam.deviceId;
                    } else if (cameras.length > 0) {
                        selectedDeviceId = cameras[0].deviceId;
                    }
                    cameraSelect.value = selectedDeviceId;
                }

                // Emit cameras_updated
                const cameraList = cameras.map(c => ({
                    id: c.deviceId,
                    label: cameraDisplayLabel(c, cameras.indexOf(c)),
                    lens_type: isMacroCamera(c) ? 'macro' : (isRearCamera(c) ? 'rear' : 'standard'),
                }));
                socket.emit('cameras_updated', {
                    cameras: cameraList,
                    active_camera: selectedDeviceId,
                    lens_mode: currentLensMode,
                    macro_available: cameras.some(isMacroCamera),
                });

            } catch (err) {
                console.error('Device enumeration error:', err);
            }
        }

        // ——————————————————————————————————
        // Frame Capture & Sending
        // ——————————————————————————————————

        function sendFrame() {
            // Clear any pending timeout
            if (frameTimeout) {
                clearTimeout(frameTimeout);
                frameTimeout = null;
            }

            if (!isStreaming) return;

            // Allow a few frames in flight to absorb jitter without building lag.
            if (pendingFrames.size >= 3) {
                scheduleNextFrame();
                return;
            }

            if (video.readyState < video.HAVE_CURRENT_DATA) {
                scheduleNextFrame();
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;

            // Scale to fit within max dimensions keeping aspect ratio
            let maxW = currentMaxWidth;
            let maxH = currentMaxHeight;
            if (vh > vw) {
                // Video is portrait, swap max dimensions
                maxW = currentMaxHeight;
                maxH = currentMaxWidth;
            }
            const scaleW = maxW / vw;
            const scaleH = maxH / vh;
            const scale = Math.min(scaleW, scaleH, 1); // never upscale
            let drawW = Math.round(vw * scale);
            let drawH = Math.round(vh * scale);

            captureCanvas.width = drawW;
            captureCanvas.height = drawH;
            captureCtx.drawImage(video, 0, 0, drawW, drawH);

            const qual = currentJpegQuality / 100;
            const frameId = String(++nextFrameId);

            captureCanvas.toBlob((blob) => {
                if (blob && isStreaming) {
                    const ackTimeout = setTimeout(() => {
                        pendingFrames.delete(frameId);
                    }, 1000);
                    pendingFrames.set(frameId, ackTimeout);

                    socket.emit('frame', {
                        frame_id: frameId,
                        image: blob,
                        mime_type: encodeFormat,
                        timestamp: Date.now(),
                    });

                    // Update stats
                    const sizeKB = (blob.size / 1024).toFixed(1);
                    statsFrameSize.textContent = sizeKB + ' KB (' + encodeFormat.split('/')[1].toUpperCase() + ')';
                }

                scheduleNextFrame();
            }, encodeFormat, qual);
        }

        function scheduleNextFrame() {
            if (!isStreaming) return;
            const intervalMs = Math.round(1000 / currentFps);
            frameTimeout = setTimeout(sendFrame, intervalMs);
        }

        function restartSendingLoop() {
            if (frameTimeout) {
                clearTimeout(frameTimeout);
                frameTimeout = null;
            }
            if (isStreaming) {
                sendFrame();
            }
        }

        // ——————————————————————————————————
        // Streaming Controls
        // ——————————————————————————————————

        function startStreaming() {
            if (isStreaming) return;
            if (!localStream) return;

            isStreaming = true;
            updateStreamUI(true);

            socket.emit('stream_state_change', { is_streaming: true });
            sendFrame();
        }

        function stopStreaming() {
            isStreaming = false;

            if (frameTimeout) {
                clearTimeout(frameTimeout);
                frameTimeout = null;
            }
            pendingFrames.forEach((timeoutId) => clearTimeout(timeoutId));
            pendingFrames.clear();

            updateStreamUI(false);
            socket.emit('stream_state_change', { is_streaming: false });
        }

        function updateStreamUI(streaming) {
            if (streaming) {
                // Stream badge
                streamBadge.classList.remove('bg-gray-700/60', 'text-gray-400');
                streamBadge.classList.add('bg-red-500/20', 'text-red-400');
                streamDot.classList.remove('bg-gray-500');
                streamDot.classList.add('bg-red-500', 'animate-pulse-dot');
                streamLabel.textContent = 'Streaming';

                // Button
                btnStream.classList.remove('bg-brandPurple');
                btnStream.classList.add('bg-red-600');
                btnStreamLabel.textContent = 'Stop Streaming';
                iconPlay.classList.add('hidden');
                iconStop.classList.remove('hidden');
            } else {
                // Stream badge
                streamBadge.classList.remove('bg-red-500/20', 'text-red-400');
                streamBadge.classList.add('bg-gray-700/60', 'text-gray-400');
                streamDot.classList.remove('bg-red-500', 'animate-pulse-dot');
                streamDot.classList.add('bg-gray-500');
                streamLabel.textContent = 'Standby';

                // Button
                btnStream.classList.remove('bg-red-600');
                btnStream.classList.add('bg-brandPurple');
                btnStreamLabel.textContent = 'Start Streaming';
                iconPlay.classList.remove('hidden');
                iconStop.classList.add('hidden');
            }
        }

        // ——————————————————————————————————
        // Flip Camera
        // ——————————————————————————————————

        async function flipCamera() {
            const options = cameraSelect.options;
            if (options.length <= 1) return;

            let idx = cameraSelect.selectedIndex;
            idx = (idx + 1) % options.length;
            cameraSelect.selectedIndex = idx;
            selectedDeviceId = options[idx].value;

            const wasStreaming = isStreaming;
            if (isStreaming) stopStreaming();

            await initCamera();

            if (wasStreaming) startStreaming();
        }

        // ——————————————————————————————————
        // Event Listeners
        // ——————————————————————————————————

        // Camera select change
        cameraSelect.addEventListener('change', async () => {
            selectedDeviceId = cameraSelect.value;
            currentLensMode = 'auto';
            lensModeSelect.value = currentLensMode;

            const wasStreaming = isStreaming;
            if (isStreaming) stopStreaming();

            await initCamera();

            if (wasStreaming) startStreaming();
        });

        lensModeSelect.addEventListener('change', async () => {
            await switchLensMode(lensModeSelect.value);
            socket.emit('cameras_updated', {
                cameras: knownCameras.map((camera, index) => ({
                    id: camera.deviceId,
                    label: cameraDisplayLabel(camera, index),
                    lens_type: isMacroCamera(camera) ? 'macro' : (isRearCamera(camera) ? 'rear' : 'standard'),
                })),
                active_camera: selectedDeviceId,
                lens_mode: currentLensMode,
                macro_available: knownCameras.some(isMacroCamera),
            });
        });

        // Quality slider
        qualitySlider.addEventListener('input', () => {
            currentJpegQuality = parseInt(qualitySlider.value, 10);
            qualitySliderValue.textContent = currentJpegQuality + '%';
        });

        // Refresh devices
        btnRefresh.addEventListener('click', async () => {
            await loadCameraDevices();
        });

        // Flip camera
        btnFlip.addEventListener('click', () => {
            flipCamera();
        });

        // Start / Stop streaming
        btnStream.addEventListener('click', () => {
            if (isStreaming) {
                stopStreaming();
            } else {
                startStreaming();
            }
        });

        // Zoom slider UI event
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomValue = document.getElementById('zoom-value');
        if (zoomSlider) {
            zoomSlider.addEventListener('input', async (e) => {
                const val = parseFloat(e.target.value);
                zoomValue.textContent = val.toFixed(1) + 'x';
                if (localStream) {
                    const track = localStream.getVideoTracks()[0];
                    try {
                        await track.applyConstraints({ advanced: [{ zoom: val }] });
                    } catch (err) { console.warn('Zoom constraint failed', err); }
                }
            });
        }

        // Focus Mode UI event
        const focusSelect = document.getElementById('focus-select');
        if (focusSelect) {
            focusSelect.addEventListener('change', async (e) => {
                const mode = e.target.value;
                if (localStream) {
                    const track = localStream.getVideoTracks()[0];
                    try {
                        await track.applyConstraints({ advanced: [{ focusMode: mode }] });
                    } catch (err) { console.warn('FocusMode constraint failed', err); }
                }
            });
        }

        // Exposure Compensation UI event
        const expSlider = document.getElementById('exposure-slider');
        const expValue = document.getElementById('exposure-value');
        if (expSlider) {
            expSlider.addEventListener('input', async (e) => {
                const val = parseFloat(e.target.value);
                expValue.textContent = val.toFixed(1);
                if (localStream) {
                    const track = localStream.getVideoTracks()[0];
                    try {
                        await track.applyConstraints({ advanced: [{ exposureCompensation: val }] });
                    } catch (err) { console.warn('Exposure constraint failed', err); }
                }
            });
        }

        // ——————————————————————————————————
        // Init
        // ——————————————————————————————————
        // Init is handled after PIN auth
        // initCamera();

    })();
    </script>
